<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background-color: #0A0E1A; /* Deep navy background matching Premium 3D design */
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 40px;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .label {
      font-size: 14px;
      color: #8892B0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .preview-box {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .preview-16 {
      padding: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="label">512px (Hero/Branding)</div>
    <div class="preview-box">
      <!-- 512px SVG Logo -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
        <defs>
          <linearGradient id="pmind-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E676"/>
            <stop offset="50%" stop-color="#7BFF5A"/>
            <stop offset="100%" stop-color="#FFB800"/>
          </linearGradient>
          <linearGradient id="node-grad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFB800"/>
            <stop offset="100%" stop-color="#00E676"/>
          </linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      
        <!-- Outer P shape / Circuit track -->
        <path d="M 160 420 L 160 170 C 160 80 230 70 310 70 C 400 70 470 140 470 230 C 470 320 400 390 310 390 L 160 390" 
              fill="none" stroke="url(#pmind-grad)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" />
              
        <!-- AI Node / Brain Motif inside counter -->
        <circle cx="310" cy="230" r="45" fill="url(#node-grad)" filter="url(#glow)" />
        <path d="M 195 230 L 260 230" stroke="url(#node-grad)" stroke-width="24" stroke-linecap="round" />
        
        <!-- Signal wave / Data dot on the stem -->
        <path d="M 160 420 L 160 320" stroke="#0A0E1A" stroke-width="16" stroke-linecap="round" />
        <circle cx="160" cy="310" r="20" fill="url(#pmind-grad)" />
      </svg>
    </div>
  </div>

  <div class="container">
    <div class="label">16px (Favicon Preview)</div>
    <div class="preview-box preview-16">
      <!-- 16px SVG Logo -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16">
        <defs>
          <linearGradient id="pmind-grad-16" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E676"/>
            <stop offset="50%" stop-color="#7BFF5A"/>
            <stop offset="100%" stop-color="#FFB800"/>
          </linearGradient>
          <linearGradient id="node-grad-16" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFB800"/>
            <stop offset="100%" stop-color="#00E676"/>
          </linearGradient>
          <filter id="glow-16" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      
        <!-- Outer P shape / Circuit track -->
        <path d="M 160 420 L 160 170 C 160 80 230 70 310 70 C 400 70 470 140 470 230 C 470 320 400 390 310 390 L 160 390" 
              fill="none" stroke="url(#pmind-grad-16)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" />
              
        <!-- AI Node / Brain Motif inside counter -->
        <circle cx="310" cy="230" r="45" fill="url(#node-grad-16)" filter="url(#glow-16)" />
        <path d="M 195 230 L 260 230" stroke="url(#node-grad-16)" stroke-width="24" stroke-linecap="round" />
        
        <!-- Signal wave / Data dot on the stem -->
        <path d="M 160 420 L 160 320" stroke="#0A0E1A" stroke-width="16" stroke-linecap="round" />
        <circle cx="160" cy="310" r="20" fill="url(#pmind-grad-16)" />
      </svg>
    </div>
  </div>

</body>
</html>
